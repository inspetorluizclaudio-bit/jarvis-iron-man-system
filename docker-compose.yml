version: '3.8'

services:
  jarvis-server:
    build: .
    container_name: jarvis-system
    ports:
      - "3001:3001"
    environment:
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID}
      - PORT=3001
      - NODE_ENV=production
      - CLAUDE_MODEL=claude-opus-4-6
      - CLAUDE_MAX_TOKENS=1024
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./logs:/app/logs
    networks:
      - jarvis-network

networks:
  jarvis-network:
    driver: bridge
